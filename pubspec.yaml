name: college_bus_tracker
description: A new Flutter project for college bus tracking.
publish_to: "none" # Remove this line if you plan to publish

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # OpenStreetMap client for Flutter (replacement for google_maps_flutter)
  flutter_map: ^5.0.0
  latlong2: ^0.9.0

  # Keep geolocator if you will use device GPS later
  geolocator: ^12.0.0

  # Firebase packages (keep your versions)
  firebase_core: ^4.1.1
  cloud_firestore: ^6.0.2
  firebase_auth: ^6.1.0

  # Optional: uncomment if you want clustering or tile caching later
  # flutter_map_marker_cluster: ^1.0.0
  # flutter_map_tile_caching: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/splash.png
